<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌞</button>
    <div class="container">
        <h1>로또 번호 추첨</h1>
        <div class="balls-container" id="balls-container">
            <!-- 번호가 여기에 생성됩니다 -->
        </div>
        <button id="generate-btn" onclick="generateLotto()">번호 추첨하기</button>
        <p class="info">행운을 빕니다!</p>

        <hr class="divider">
        
        <div class="contact-section">
            <h3>제휴 및 문의</h3>
            <form action="https://formspree.io/f/xwvyvapa" method="POST" id="contact-form">
                <div class="input-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="input-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>

        <hr class="divider">
        
        <div id="disqus_thread"></div>

</html>
