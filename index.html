<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 나를 닮은 동물은?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">동물상 테스트</h1>
            <p class="subtitle">AI가 알려주는 당신을 닮은 동물!</p>
        </header>

        <section class="mode-selector">
            <button id="upload-mode-btn" class="mode-btn active">사진 업로드</button>
            <button id="webcam-mode-btn" class="mode-btn">웹캠 실시간</button>
        </section>

        <main class="content-area">
            <!-- 사진 업로드 영역 -->
            <div id="upload-container" class="input-container active">
                <div class="image-upload-wrap" id="drop-zone">
                    <input class="file-upload-input" type='file' id="file-input" onchange="readURL(this);" accept="image/*" />
                    <div class="drag-text">
                        <img src="https://img.icons8.com/plasticine/100/000000/image.png" alt="upload icon">
                        <h3>이미지를 끌어다 놓거나 클릭하여 업로드하세요</h3>
                    </div>
                </div>
                <div class="file-upload-content" id="image-preview-container" style="display:none;">
                    <img class="file-upload-image" id="face-image" src="#" alt="your image" />
                    <div class="image-title-wrap">
                        <button type="button" onclick="removeUpload()" class="remove-image">삭제 <span class="image-title">Uploaded Image</span></button>
                    </div>
                </div>
            </div>

            <!-- 웹캠 영역 -->
            <div id="webcam-container" class="input-container" style="display:none;">
                <div id="webcam-feed"></div>
                <button type="button" id="start-webcam-btn" class="action-btn">웹캠 시작하기</button>
            </div>
        </main>

        <section id="result-section" class="result-area" style="display:none;">
            <div id="loading" class="loading-spinner">
                <p>AI가 분석 중입니다...</p>
            </div>
            <div id="prediction-results" style="display:none;">
                <h2 id="result-message" class="result-message">결과 분석 중...</h2>
                <div id="label-container" class="label-container">
                    <!-- 결과 바(Bar)가 여기에 생성됩니다 -->
                </div>
                <button type="button" class="action-btn restart-btn" onclick="window.location.reload();">다시 시도하기</button>
            </div>
        </section>

        <footer>
            <p>&copy; 2024 Animal Face AI. Powered by Teachable Machine</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
